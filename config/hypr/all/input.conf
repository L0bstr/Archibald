
#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = hu
    follow_mouse = 2
    sensitivity = 0.5
    accel_profile = flat

    touchpad {
        natural_scroll = true
	scroll_factor = 0.1
    }
}

gesture = 3, horizontal, workspace
